<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font: 14px Inter, -apple-system, sans-serif;
        width: 220px;
        margin: 0;
        padding: 14px;
        color: #1d2226;
      }
      h1 { font-size: 15px; margin: 0 0 8px; }
      .status { font-size: 13px; margin: 6px 0; }
      .ok { color: #0a7d3c; }
      .bad { color: #c0392b; }
      a {
        display: block;
        margin-top: 10px;
        color: #0a66c2;
        text-decoration: none;
        font-weight: 600;
      }
      p.hint { color: #6b7280; font-size: 12px; margin: 8px 0 0; }
    </style>
  </head>
  <body>
    <h1>LinkedIn Saver</h1>
    <div class="status" id="status">Checking server…</div>
    <a href="http://localhost:5173" target="_blank">Open my saved posts →</a>
    <p class="hint">On a LinkedIn feed, click <b>💾 Save</b> on any post.</p>
    <script src="popup.js"></script>
  </body>
</html>
